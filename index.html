<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>港式台牌 Ultimate Pro Max</title>

<style>
:root{
--bg:#0f0f0f;
--card:#1c1c1c;
--gold:#d4af37;
--accent:#00ff88;
--danger:#cc0000;
--text:#ffffff;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont;
padding:15px;
padding-bottom:120px;
}

/* Tabs */
.tabs{display:flex;margin-bottom:15px;}
.tabBtn{
flex:1;
padding:12px;
background:#222;
border:none;
color:#aaa;
font-weight:bold;
}
.tabBtn.active{
background:var(--gold);
color:black;
}
.tabContent{display:none;}
.tabContent.active{display:block;}

.section{
background:var(--card);
padding:15px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 0 25px rgba(212,175,55,0.15);
}

h2{color:var(--gold);}

/* 番表 */
.collapsible{
background:#222;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}
.content{display:none;padding:10px 5px;}

.fixedTotal{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
border-top:2px solid var(--gold);
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.totalText{
color:var(--gold);
font-size:22px;
font-weight:bold;
}

/* 麻雀枱 */
.player{
background:#222;
padding:12px;
border-radius:16px;
text-align:center;
margin-bottom:12px;
}
.player.leader{outline:3px solid var(--gold);}
.player.dealer{box-shadow:0 0 20px var(--gold);}
.scoreInput{width:80px;font-size:20px;}
.money{color:var(--gold);margin-top:6px;}

button{
border:none;
border-radius:12px;
padding:8px 14px;
margin-top:6px;
background:var(--accent);
font-weight:bold;
}
button.danger{background:var(--danger);color:#fff;}

select,input{border:none;border-radius:8px;padding:6px;}
</style>
</head>

<body>

<div class="tabs">
<button class="tabBtn active" onclick="switchTab(0)">計番</button>
<button class="tabBtn" onclick="switchTab(1)">麻雀枱</button>
</div>

<!-- TAB 1 計番 -->
<div class="tabContent active">

<div class="section">
<h2>拉劈計數機</h2>
現針番數：
<input type="number" id="currentFan" oninput="calcLap()"><br><br>
新針番數：
<input type="number" id="newFan" oninput="calcLap()">

<div style="margin-top:10px;background:#222;padding:10px;border-radius:10px;">
新針拉緊：<span id="lapResult">0</span><br><br>
現針即劈：<span id="currentHalf">0</span><br><br>
拉完再劈：<span id="lapHalf">0</span>
</div>
</div>

<div class="section">
<h2>番表</h2>
<div id="fanContainer"></div>
</div>

<div class="fixedTotal">
<div class="totalText">
總番數：<span id="totalFan">0</span> 番
</div>
<button class="danger" onclick="clearAll()">清零</button>
</div>

</div>

<!-- TAB 2 麻雀枱 -->
<div class="tabContent">

<div class="section" id="players"></div>

<div class="section">
👑 領先：<span id="leaderName">無</span><br><br>
🎲 <span id="diceResult">-</span>
<button onclick="rollDice()">擲骰</button>
<br><br>
1番 = $
<input type="number" id="rate" value="10" onchange="updateScores()" style="width:70px">
<br><br>
總局數：<span id="rounds">0</span>
</div>

<div class="section">
<h2>🀄 結算</h2>

贏家：
<select id="winner"></select>

方式：
<select id="winType" onchange="toggleShooter()">
<option value="self">自摸</option>
<option value="shoot">食胡</option>
</select>

<span id="shooterArea">
放銃：
<select id="shooter"></select>
</span>

<br><br>
番數：
<input type="number" id="fan" value="1" style="width:70px">

<br><br>
<button onclick="settle()">結算</button>
</div>

<button class="danger" onclick="resetAll()">全場清零</button>

</div>

<script>

/* Tab */
function switchTab(i){
document.querySelectorAll(".tabBtn").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tabContent").forEach(c=>c.classList.remove("active"));
document.querySelectorAll(".tabBtn")[i].classList.add("active");
document.querySelectorAll(".tabContent")[i].classList.add("active");
}


/* 番表資料 */
const fanData = {


"莊":[
["莊",1]
],


"一般":[
["花",1],["正花",2],["字",2],["無字",2],["無字花",5],["將眼",2],
["對碰",2],["獨獨",2],["假獨",1],["老少",5],["門清",5],
["缺一門",5],["缺五",5],["斷么",5],["不求人",10],["半求人",20],["全求人",40]
],


"叮":[
["叮",5],["即食",5],["天叮",40],["地叮",20]
],


"自摸":[
["自摸",1],["門清自摸",8],["花摸",1],["槓摸",5],["槓上槓摸",30]
],


"槓":[
["槓",1],["暗槓",2],["兩槓",10],["三槓",30],["四槓",100],["五槓",240],
["搶槓",5],["搶槓上槓",30]
],


"平胡":[["平胡",10],["無字花大平胡",20]
],


"雞胡":[["細雞",10],["大雞",20]
],


"暗間":[["兩暗",5],["三暗",15],["四暗",30],["五暗",60],["間間胡",100]
],


"般高 + 相逢":[
["般高",5],["三般高",15],["四般高",30],
["相逢",3],["三相逢",10],["四相逢",30],["五相逢",60],
["半姊妹",20],["全姊妹",40]
],


"兄弟姊妹":[
["兄弟",5],["小三兄弟",15],["大三兄弟",30],
["姊妹",3],["小三姊妹",10],["大三姊妹",15]
],


"步步高":[
["明三色步步高",5],["暗三色步步高",10],
["明單色步步高",15],["暗單色步步高",20]
],


"歸":[
["明四歸一",5],["明四歸二",15],["明四歸四",60],
["暗四歸一",10],["暗四歸二",30],["暗四歸四",100]
],


"一條龍":[
["明雜龍",8],["暗雜龍",15],["明清龍",15],["暗清龍",20]
],


"多門齊":[
["小五門齊",10],["大五門齊",15],
["小七門齊",15],["大七門齊",20]
],


"么九":[
["混帶么",15],["全帶么",30],["混么九",40],["清么九",120]
],


"奇牌":[
["混一色",40],["清一色",100],["對對胡",40],["小三元",40],
["大三元",80],["小三風",40],["大三風",80],["小四喜",60],
["大四喜",120],["字一色",150],["十六不搭",60],["十三么",150],
["嚦咕嚦咕",40],["大嚦咕嚦咕",60],["天胡",100],
["地胡",100],["人胡",80],["七搶一",30],["一搶七",30],["八仙過海",40]
]


};


function renderFans(){
let container=document.getElementById("fanContainer");
for(let category in fanData){
let header=document.createElement("div");
header.className="collapsible";
header.innerHTML=category;
let content=document.createElement("div");
content.className="content";

fanData[category].forEach(item=>{
content.innerHTML+=`
<label>
<input type="checkbox" value="${item[1]}" onchange="updateTotal()">
${item[0]} (${item[1]}番)
</label><br>`;
});

if(category==="莊"){
content.innerHTML+=`
連莊次數：
<input type="number" id="dealerCount" min="0" value="0" onchange="updateTotal()">
(次數 ×2 +1)
`;
}

header.onclick=function(){
content.style.display=content.style.display==="block"?"none":"block";
};

container.appendChild(header);
container.appendChild(content);
}
}

function updateTotal(){
let total=0;
document.querySelectorAll("input[type=checkbox]:checked")
.forEach(cb=>total+=parseInt(cb.value));
let dealer=parseInt(document.getElementById("dealerCount")?.value||0);
if(dealer>0){total+=dealer*2+1;}
document.getElementById("totalFan").innerText=total;
}

function clearAll(){
document.querySelectorAll("input[type=checkbox]").forEach(cb=>cb.checked=false);
let dealer=document.getElementById("dealerCount");
if(dealer) dealer.value=0;
updateTotal();
}

/* 拉劈 */
function calcLap(){
let current=parseFloat(document.getElementById("currentFan").value||0);
let newFan=parseFloat(document.getElementById("newFan").value||0);
let lap=Math.ceil(current*1.5+newFan);
document.getElementById("lapResult").innerText=lap;
document.getElementById("currentHalf").innerText=Math.floor(current/2);
document.getElementById("lapHalf").innerText=Math.floor(lap/2);
}

/* 麻雀枱 */
let roundCount=0;
let dealerIndex=null;

function createPlayers(){
let div=document.getElementById("players");
const names=["東","南","西","北"];
for(let i=0;i<4;i++){
div.innerHTML+=`
<div class="player" id="p${i}">
<input value="${names[i]}" id="name${i}" onchange="updateDropdowns()"><br><br>
<input type="number" class="scoreInput" value="0" id="score${i}" onchange="updateScores()">
<div class="money" id="money${i}">$0</div>
<button onclick="setDealer(${i})">設為莊</button>
</div>
`;
}
updateDropdowns();
}

function updateDropdowns(){
let winner=document.getElementById("winner");
let shooter=document.getElementById("shooter");
winner.innerHTML="";
shooter.innerHTML="";
for(let i=0;i<4;i++){
let name=document.getElementById("name"+i).value;
winner.innerHTML+=`<option value="${i}">${name}</option>`;
shooter.innerHTML+=`<option value="${i}">${name}</option>`;
}
updateScores();
}

function toggleShooter(){
let type=document.getElementById("winType").value;
document.getElementById("shooterArea").style.display=
(type==="self")?"none":"inline";
}

function settle(){
let winner=parseInt(document.getElementById("winner").value);
let type=document.getElementById("winType").value;
let shooter=parseInt(document.getElementById("shooter").value);
let fan=parseInt(document.getElementById("fan").value||0);
let rate=parseInt(document.getElementById("rate").value||0);

let amount=fan*rate;

if(type==="self"){
for(let i=0;i<4;i++){
if(i!==winner){
changeScore(i,-amount);
changeScore(winner,amount);
}
}
}else{
if(shooter===winner){
alert("放銃不能等於贏家");
return;
}
changeScore(shooter,-amount);
changeScore(winner,amount);
}

roundCount++;
document.getElementById("rounds").innerText=roundCount;
updateScores();
}

function changeScore(i,val){
let score=parseInt(document.getElementById("score"+i).value||0);
document.getElementById("score"+i).value=score+val;
}

function updateScores(){
let rate=parseInt(document.getElementById("rate").value||0);
let max=-99999;
let leader=null;

for(let i=0;i<4;i++){
let score=parseInt(document.getElementById("score"+i).value||0);
document.getElementById("money"+i).innerText="$"+(score*rate);
document.getElementById("p"+i).classList.remove("leader");
if(score>max){max=score;leader=i;}
}

if(max!==0){
document.getElementById("p"+leader).classList.add("leader");
document.getElementById("leaderName").innerText=
document.getElementById("name"+leader).value;
}else{
document.getElementById("leaderName").innerText="無";
}
}

function setDealer(i){
dealerIndex=i;
for(let x=0;x<4;x++){
document.getElementById("p"+x).classList.remove("dealer");
}
document.getElementById("p"+i).classList.add("dealer");
}

function rollDice(){
let d1=Math.floor(Math.random()*6)+1;
let d2=Math.floor(Math.random()*6)+1;
document.getElementById("diceResult").innerText=
d1+" + "+d2+" = "+(d1+d2);
}

function resetAll(){
for(let i=0;i<4;i++){
document.getElementById("score"+i).value=0;
}
roundCount=0;
document.getElementById("rounds").innerText=0;
updateScores();
}

createPlayers();
renderFans();
toggleShooter();
updateScores();

</script>

</body>
</html>

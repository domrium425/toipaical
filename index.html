<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>港式台牌 Ultimate 雙Tab版</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--bg:#1e1e1e;
--card:#2c2c2c;
--accent:#00ff88;
--button:#cc0000;
--text:#ffffff;
}

body{
background:var(--bg);
color:var(--text);
font-family:Arial;
margin:0;
padding:15px;
padding-bottom:120px;
}

/* Tab */
.tabs{
display:flex;
margin-bottom:15px;
}

.tabBtn{
flex:1;
padding:10px;
background:#333;
border:none;
color:white;
cursor:pointer;
}

.tabBtn.active{
background:var(--accent);
color:black;
font-weight:bold;
}

.tabContent{
display:none;
}

.tabContent.active{
display:block;
}

/* Card */
.section{
background:var(--card);
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

/* 番表 */
.collapsible{
cursor:pointer;
padding:10px;
background:#333;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
}

.content{display:none;padding:10px 5px;}

.fixedTotal{
position:fixed;
bottom:0;
left:0;
width:100%;
background:var(--card);
border-top:2px solid var(--accent);
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.totalText{
color:var(--accent);
font-size:22px;
font-weight:bold;
}

.clearBtn{
background:var(--button);
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

/* 四人 */
.players{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.playerCard{
background:#333;
padding:15px;
border-radius:10px;
text-align:center;
}

.score{
font-size:26px;
color:var(--accent);
margin:10px 0;
}

.addBtn{background:#007aff;color:white;}
.subBtn{background:#ff3b30;color:white;}
button{
padding:6px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin:2px;
}

.leader{
outline:3px solid gold;
}

</style>
</head>
<body>

<!-- TAB BUTTON -->
<div class="tabs">
<button class="tabBtn active" onclick="switchTab(0)">
<i class="fa-solid fa-calculator"></i> 計番
</button>
<button class="tabBtn" onclick="switchTab(1)">
<i class="fa-solid fa-users"></i> 四人同步
</button>
</div>

<!-- TAB 1 計番 -->
<div class="tabContent active">

<div class="section">
<h2>拉劈計數機</h2>
現針番數：
<input type="number" id="currentFan" oninput="calcLap()"><br><br>
新針番數：
<input type="number" id="newFan" oninput="calcLap()">
<div style="margin-top:10px;background:#333;padding:10px;border-radius:8px;">
新針拉緊：<span id="lapResult">0</span><br><br>
現針即劈：<span id="currentHalf">0</span><br><br>
拉完再劈：<span id="lapHalf">0</span>
</div>
</div>

<div class="section">
<h2>番表</h2>
<div id="fanContainer"></div>
</div>

<div class="fixedTotal">
<div class="totalText">
總番數：<span id="totalFan">0</span> 番
</div>
<button class="clearBtn" onclick="clearAll()">清零</button>
</div>

</div>

<!-- TAB 2 四人 -->
<div class="tabContent">

<div class="section">
<h2>四人分數</h2>
<div class="players">

<div class="playerCard" id="p0">
<h3>東</h3>
<div class="score" id="score0">0</div>
<button class="addBtn" onclick="changeScore(0,1)">+1</button>
<button class="subBtn" onclick="changeScore(0,-1)">-1</button>
</div>

<div class="playerCard" id="p1">
<h3>南</h3>
<div class="score" id="score1">0</div>
<button class="addBtn" onclick="changeScore(1,1)">+1</button>
<button class="subBtn" onclick="changeScore(1,-1)">-1</button>
</div>

<div class="playerCard" id="p2">
<h3>西</h3>
<div class="score" id="score2">0</div>
<button class="addBtn" onclick="changeScore(2,1)">+1</button>
<button class="subBtn" onclick="changeScore(2,-1)">-1</button>
</div>

<div class="playerCard" id="p3">
<h3>北</h3>
<div class="score" id="score3">0</div>
<button class="addBtn" onclick="changeScore(3,1)">+1</button>
<button class="subBtn" onclick="changeScore(3,-1)">-1</button>
</div>

</div>
</div>

</div>

<script>

/* TAB */
function switchTab(index){
let tabs=document.querySelectorAll(".tabBtn");
let contents=document.querySelectorAll(".tabContent");
tabs.forEach(t=>t.classList.remove("active"));
contents.forEach(c=>c.classList.remove("active"));
tabs[index].classList.add("active");
contents[index].classList.add("active");
}

/* 番表資料 */
const fanData = {

"莊":[
["莊",1]
],

"一般":[
["花",1],["正花",2],["字",2],["無字",2],["無字花",5],["將眼",2],
["對碰",2],["獨獨",2],["假獨",1],["老少",5],["門清",5],
["缺一門",5],["缺五",5],["斷么",5],["不求人",10],["半求人",20],["全求人",40]
],

"叮":[
["叮",5],["即食",5],["天叮",40],["地叮",20]
],

"自摸":[
["自摸",1],["門清自摸",8],["花摸",1],["槓摸",5],["槓上槓摸",30]
],

"槓":[
["槓",1],["暗槓",2],["兩槓",10],["三槓",30],["四槓",100],["五槓",240],
["搶槓",5],["搶槓上槓",30]
],

"平胡":[["平胡",10],["無字花大平胡",20]
],

"雞胡":[["細雞",10],["大雞",20]
],

"暗間":[["兩暗",5],["三暗",15],["四暗",30],["五暗",60],["間間胡",100]
],

"般高 + 相逢":[
["般高",5],["三般高",15],["四般高",30],
["相逢",3],["三相逢",10],["四相逢",30],["五相逢",60],
["半姊妹",20],["全姊妹",40]
],

"兄弟姊妹":[
["兄弟",5],["小三兄弟",15],["大三兄弟",30],
["姊妹",3],["小三姊妹",10],["大三姊妹",15]
],

"步步高":[
["明三色步步高",5],["暗三色步步高",10],
["明單色步步高",15],["暗單色步步高",20]
],

"歸":[
["明四歸一",5],["明四歸二",15],["明四歸四",60],
["暗四歸一",10],["暗四歸二",30],["暗四歸四",100]
],

"一條龍":[
["明雜龍",8],["暗雜龍",15],["明清龍",15],["暗清龍",20]
],

"多門齊":[
["小五門齊",10],["大五門齊",15],
["小七門齊",15],["大七門齊",20]
],

"么九":[
["混帶么",15],["全帶么",30],["混么九",40],["清么九",120]
],

"奇牌":[
["混一色",40],["清一色",100],["對對胡",40],["小三元",40],
["大三元",80],["小三風",40],["大三風",80],["小四喜",60],
["大四喜",120],["字一色",150],["十六不搭",60],["十三么",150],
["嚦咕嚦咕",40],["大嚦咕嚦咕",60],["天胡",100],
["地胡",100],["人胡",80],["七搶一",30],["一搶七",30],["八仙過海",40]
]

};

function renderFans(){
let container=document.getElementById("fanContainer");
for(let category in fanData){
let header=document.createElement("div");
header.className="collapsible";
header.innerHTML=`${category}`;

let content=document.createElement("div");
content.className="content";

fanData[category].forEach(item=>{
content.innerHTML+=`
<label>
<input type="checkbox" value="${item[1]}" onchange="updateTotal()"> 
${item[0]} (${item[1]}番)
</label><br>`;
});

if(category==="莊"){
content.innerHTML+=`
連莊次數：
<input type="number" id="dealerCount" min="0" value="0" onchange="updateTotal()"> 
(次數 ×2 +1)
`;
}

header.onclick=function(){
content.style.display=
content.style.display==="block"?"none":"block";
};

container.appendChild(header);
container.appendChild(content);
}
}

function updateTotal(){
let total=0;
document.querySelectorAll("input[type=checkbox]:checked")
.forEach(cb=>total+=parseInt(cb.value));
let dealer=parseInt(document.getElementById("dealerCount")?.value||0);
if(dealer>0){total+=dealer*2+1;}
document.getElementById("totalFan").innerText=total;
}

function clearAll(){
document.querySelectorAll("input[type=checkbox]")
.forEach(cb=>cb.checked=false);
document.getElementById("dealerCount").value=0;
updateTotal();
}

/* 拉劈 */
function calcLap(){
let current=parseFloat(document.getElementById("currentFan").value||0);
let newFan=parseFloat(document.getElementById("newFan").value||0);
let lap=Math.ceil(current*1.5+newFan);
let currentHalf=Math.floor(current/2);
let lapHalf=Math.floor(lap/2);
document.getElementById("lapResult").innerText=lap;
document.getElementById("currentHalf").innerText=currentHalf;
document.getElementById("lapHalf").innerText=lapHalf;
}

/* 四人 */
let scores=[0,0,0,0];
const names=["東","南","西","北"];

function changeScore(player,amount){
scores[player]+=amount;
updateUI();
}

function updateUI(){
for(let i=0;i<4;i++){
document.getElementById("score"+i).innerText=scores[i];
document.getElementById("p"+i).classList.remove("leader");
}
let max=Math.max(...scores);
if(max>0){
let index=scores.indexOf(max);
document.getElementById("p"+index).classList.add("leader");
}
}

renderFans();
updateUI();

</script>

</body>
</html>
